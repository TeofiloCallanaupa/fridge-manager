<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Larder - Update Inventory</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "tertiary-container": "#596da1",
                        "tertiary-fixed-dim": "#b1c5ff",
                        "on-primary-fixed-variant": "#0a5132",
                        "on-primary-fixed": "#002111",
                        "background": "#f9f9f7",
                        "secondary": "#585f6c",
                        "outline": "#707972",
                        "surface": "#f9f9f7",
                        "surface-container-low": "#f4f4f2",
                        "surface-tint": "#2a6a48",
                        "inverse-surface": "#2f3130",
                        "outline-variant": "#bfc9c0",
                        "surface-container-lowest": "#ffffff",
                        "primary-container": "#3b7a57",
                        "primary": "#206140",
                        "surface-container-highest": "#e2e3e1",
                        "on-secondary": "#ffffff",
                        "on-background": "#1a1c1b",
                        "on-secondary-container": "#5e6572",
                        "surface-variant": "#e2e3e1",
                        "error": "#ba1a1a",
                        "on-error": "#ffffff",
                        "on-error-container": "#93000a",
                        "on-primary": "#ffffff",
                        "tertiary": "#405587",
                        "surface-container": "#eeeeec",
                        "on-surface": "#1a1c1b",
                        "on-secondary-fixed": "#151c27",
                        "on-tertiary-container": "#f0f1ff",
                        "secondary-fixed": "#dce2f3",
                        "inverse-on-surface": "#f1f1ef",
                        "primary-fixed": "#aff1c6",
                        "surface-container-high": "#e8e8e6",
                        "on-tertiary": "#ffffff",
                        "on-secondary-fixed-variant": "#404754",
                        "surface-dim": "#dadad8",
                        "primary-fixed-dim": "#93d5ac",
                        "on-tertiary-fixed": "#001947",
                        "on-tertiary-fixed-variant": "#314576",
                        "inverse-primary": "#93d5ac",
                        "on-surface-variant": "#404942",
                        "surface-bright": "#f9f9f7",
                        "tertiary-fixed": "#dae2ff",
                        "secondary-container": "#dce2f3",
                        "secondary-fixed-dim": "#c0c7d6",
                        "error-container": "#ffdad6",
                        "on-primary-container": "#c5ffd8"
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    fontFamily: {
                        "headline": ["Plus Jakarta Sans"],
                        "display": ["Plus Jakarta Sans"],
                        "body": ["Plus Jakarta Sans"],
                        "label": ["Plus Jakarta Sans"]
                    }
                }
            }
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-surface antialiased overflow-hidden">
<!-- Blurred Background Content (Mock Screen 8) -->
<div class="fixed inset-0 z-0 overflow-hidden blur-sm scale-105 pointer-events-none">
<header class="flex items-center justify-between px-8 py-4 w-full bg-white/80">
<h1 class="text-[#3B7A57] font-bold text-xl tracking-tighter">Larder</h1>
<div class="w-10 h-10 rounded-full bg-surface-container-highest"></div>
</header>
<main class="px-8 pt-8 space-y-6">
<h2 class="font-headline text-headline-lg font-bold tracking-tight text-on-surface">My Inventory</h2>
<div class="grid grid-cols-2 gap-4">
<div class="p-6 rounded-[1.5rem] bg-white shadow-sm space-y-2">
<div class="w-12 h-12 bg-primary-container/10 rounded-xl flex items-center justify-center text-2xl">🥩</div>
<p class="font-bold">Beef Roast</p>
<p class="text-on-secondary-container text-sm">3 lbs</p>
</div>
<div class="p-6 rounded-[1.5rem] bg-white shadow-sm space-y-2 border-primary border-2">
<div class="w-12 h-12 bg-primary-container/10 rounded-xl flex items-center justify-center text-2xl">🍗</div>
<p class="font-bold">Chicken breast</p>
<p class="text-on-secondary-container text-sm">2 lbs</p>
</div>
<div class="p-6 rounded-[1.5rem] bg-white shadow-sm space-y-2">
<div class="w-12 h-12 bg-primary-container/10 rounded-xl flex items-center justify-center text-2xl">🥛</div>
<p class="font-bold">Whole Milk</p>
<p class="text-on-secondary-container text-sm">1 Gallon</p>
</div>
<div class="p-6 rounded-[1.5rem] bg-white shadow-sm space-y-2">
<div class="w-12 h-12 bg-primary-container/10 rounded-xl flex items-center justify-center text-2xl">🥬</div>
<p class="font-bold">Spinach</p>
<p class="text-on-secondary-container text-sm">5 oz</p>
</div>
</div>
</main>
</div>
<!-- Scrim Overlay -->
<div class="fixed inset-0 bg-[#1A1C1B]/40 z-10 backdrop-blur-[2px]"></div>
<!-- Bottom Sheet Component -->
<div class="fixed inset-x-0 bottom-0 z-50 transform transition-transform duration-300">
<div class="bg-white rounded-t-[24px] max-w-2xl mx-auto overflow-hidden shadow-[0px_-12px_32px_rgba(26,28,27,0.06)]">
<!-- Handle -->
<div class="flex justify-center pt-4">
<div class="w-12 h-1.5 bg-surface-container-highest rounded-full"></div>
</div>
<!-- Content Container -->
<div class="px-8 pt-8 pb-10 space-y-8">
<!-- 1. Item Context Header -->
<div class="flex flex-col items-center text-center space-y-2">
<div class="w-16 h-16 bg-surface-container-low rounded-[1.5rem] flex items-center justify-center text-4xl mb-2">
                        🍗
                    </div>
<h2 class="font-headline text-[1.75rem] leading-tight font-semibold text-on-surface">Chicken breast</h2>
<p class="font-label text-on-secondary-container tracking-wide font-medium">2 lbs</p>
</div>
<!-- 2. Question Prompt -->
<div class="text-center">
<h3 class="font-headline text-3xl font-extrabold tracking-tight text-on-surface">What happened?</h3>
</div>
<!-- 3. Action Cards (Vertical Stack) -->
<div class="space-y-4">
<!-- 'Used it' card -->
<button class="w-full text-left p-6 rounded-[1.5rem] bg-surface-container-low hover:bg-surface-container-highest transition-colors flex items-center gap-6 group">
<div class="w-14 h-14 rounded-full bg-white flex items-center justify-center text-primary">
<span class="material-symbols-outlined text-3xl" data-icon="check_circle" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
<div class="flex-1">
<p class="font-headline text-xl font-bold text-on-surface">Used it</p>
<p class="text-on-secondary-container">Finished, consumed, or used up</p>
</div>
</button>
<!-- 'Tossed it' card -->
<button class="w-full text-left p-6 rounded-[1.5rem] bg-surface-container-low hover:bg-surface-container-highest transition-colors flex items-center gap-6 group">
<div class="w-14 h-14 rounded-full bg-white flex items-center justify-center text-error">
<span class="material-symbols-outlined text-3xl" data-icon="delete" style="font-variation-settings: 'FILL' 1;">delete</span>
</div>
<div class="flex-1">
<p class="font-headline text-xl font-bold text-on-surface">Tossed it</p>
<p class="text-on-secondary-container">Expired, spoiled, or thrown away</p>
</div>
</button>
</div>
<!-- 4. Restock Suggestion -->
<div class="pt-4 border-t border-surface-container-highest/0"> <!-- Border hidden as per "No 1px border" rule, using spacing/tone instead -->
<div class="p-6 rounded-[1.5rem] bg-surface-container-low/50 space-y-6">
<p class="text-center font-headline text-lg font-bold text-on-surface">Add to grocery list?</p>
<div class="flex flex-col sm:flex-row gap-4">
<button class="flex-1 bg-gradient-to-br from-primary to-primary-container text-white py-4 px-8 rounded-full font-bold hover:opacity-90 active:scale-95 transition-all shadow-md">
                                Yes, add it
                            </button>
<button class="flex-1 bg-secondary-container text-on-secondary-container py-4 px-8 rounded-full font-bold hover:bg-surface-container-highest active:scale-95 transition-all">
                                No thanks
                            </button>
</div>
</div>
</div>
<!-- 5. Cancel Link -->
<div class="text-center pt-2">
<button class="font-headline font-bold text-on-secondary-container hover:text-on-surface transition-colors">
                        Cancel
                    </button>
</div>
</div>
</div>
</div>
</body></html>
