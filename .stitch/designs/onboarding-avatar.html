      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;

    }
  </style>
<style>

<body class="bg-surface text-on-surface font-body selection:bg-primary-fixed">
<!-- TopAppBar Navigation -->
<header class="fixed top-0 w-full z-50 bg-[#F9F9F7]/80 dark:bg-[#1A1C1B]/80 backdrop-blur-[20px] shadow-[0_12px_32px_rgba(26,28,27,0.06)]">
<div class="flex items-center justify-between px-8 h-16 w-full max-w-screen-xl mx-auto">
<div class="flex items-center gap-4">
<button class="p-2 -ml-2 rounded-full hover:bg-[#E2E3E1]/50 active:scale-95 duration-200 ease-in-out text-[#3B7A57]">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<span class="text-lg font-extrabold font-headline tracking-tight text-[#1C1C1E]">Avatar Creator</span>
</div>
<div class="bg-secondary-container px-4 py-1 rounded-full">
<span class="text-on-secondary-container font-label text-xs font-semibold tracking-wide uppercase">Step 2 of 3</span>
</div>
</div>
</header>

<!-- Hero Section: Editorial Headline -->
<section class="mb-12">
<h1 class="font-headline text-4xl md:text-5xl font-extrabold text-on-surface tracking-tight leading-tight mb-4">
        Create your avatar
      </h1>
<p class="text-on-secondary-container text-lg md:text-xl max-w-md leading-relaxed">
        Personalize your digital chef to reflect your unique flavor in the kitchen.
      </p>
</section>
<div class="flex flex-col lg:flex-row gap-16 items-start">
<!-- Avatar Preview Column -->
<div class="w-full lg:w-1/2 sticky top-24">
<div class="aspect-square w-full max-w-md mx-auto rounded-[3rem] bg-surface-container-low flex items-center justify-center relative overflow-hidden group">
<div class="absolute inset-0 bg-gradient-to-tr from-primary/5 to-transparent opacity-50"></div>
<div class="relative w-64 h-64 md:w-80 md:h-80 bg-[#FFFDF0] rounded-full border-8 border-surface-container-lowest shadow-[0_20px_40px_rgba(0,0,0,0.04)] flex items-center justify-center overflow-hidden">

</div>
<!-- Editorial Accent -->
<div class="absolute bottom-8 right-8">
<div class="w-16 h-16 rounded-full bg-primary flex items-center justify-center text-white shadow-xl transform rotate-12">
<span class="material-symbols-outlined" data-icon="auto_fix_high" style="font-variation-settings: 'FILL' 1;">auto_fix_high</span>
</div>
</div>
</div>
</div>
<!-- Customization Pickers Column -->
<div class="w-full lg:w-1/2 space-y-12">
<!-- Hair Picker -->
<div class="space-y-4">
<div class="flex justify-between items-end">
<h3 class="font-headline text-xl font-bold text-on-surface">Hair</h3>
<span class="text-on-secondary-container font-label text-sm">7 options</span>
</div>
<div class="flex gap-4 overflow-x-auto pb-4 scrollbar-hide">
<button class="flex-shrink-0 w-20 h-20 rounded-full border-4 border-[#3B7A57] bg-surface-container-lowest flex items-center justify-center active:scale-90 transition-transform">
<span class="material-symbols-outlined text-3xl" data-icon="person">person</span>
</button>
<button class="flex-shrink-0 w-20 h-20 rounded-full border-4 border-transparent bg-secondary-container flex items-center justify-center active:scale-90 transition-transform hover:opacity-80">
<span class="material-symbols-outlined text-3xl" data-icon="face_6">face_6</span>
</button>
<button class="flex-shrink-0 w-20 h-20 rounded-full border-4 border-transparent bg-secondary-container flex items-center justify-center active:scale-90 transition-transform hover:opacity-80">
<span class="material-symbols-outlined text-3xl" data-icon="face_3">face_3</span>
</button>

<span class="material-symbols-outlined text-3xl" data-icon="face_5">face_5</span>
</button>
</div>
</div>

<div class="flex justify-between items-end">
<h3 class="font-headline text-xl font-bold text-on-surface">Accessories</h3>
<span class="text-on-secondary-container font-label text-sm">4 options</span>
</div>

<button class="flex-shrink-0 w-20 h-20 rounded-full border-4 border-transparent bg-secondary-container flex items-center justify-center active:scale-90 transition-transform hover:opacity-80">
<span class="material-symbols-outlined text-3xl" data-icon="cooking">cooking</span>
</button>
<button class="flex-shrink-0 w-20 h-20 rounded-full border-4 border-[#3B7A57] bg-surface-container-lowest flex items-center justify-center active:scale-90 transition-transform">
<span class="material-symbols-outlined text-3xl" data-icon="eyeglasses">eyeglasses</span>
</button>
<button class="flex-shrink-0 w-20 h-20 rounded-full border-4 border-transparent bg-secondary-container flex items-center justify-center active:scale-90 transition-transform hover:opacity-80">

<span class="material-symbols-outlined text-3xl" data-icon="headphones">headphones</span>

</div>
</div>

<button class="flex-shrink-0 w-16 h-16 rounded-full border-4 border-transparent bg-[#F5D5C5] ring-offset-4 ring-2 ring-transparent hover:ring-[#3B7A57] active:scale-90 transition-all"></button>
<button class="flex-shrink-0 w-16 h-16 rounded-full border-4 border-[#3B7A57] bg-[#E5B087] ring-offset-4 ring-2 ring-transparent active:scale-90 transition-all"></button>
<button class="flex-shrink-0 w-16 h-16 rounded-full border-4 border-transparent bg-[#A67C52] ring-offset-4 ring-2 ring-transparent hover:ring-[#3B7A57] active:scale-90 transition-all"></button>
<button class="flex-shrink-0 w-16 h-16 rounded-full border-4 border-transparent bg-[#70483C] ring-offset-4 ring-2 ring-transparent hover:ring-[#3B7A57] active:scale-90 transition-all"></button>
<button class="flex-shrink-0 w-16 h-16 rounded-full border-4 border-transparent bg-[#402E2A] ring-offset-4 ring-2 ring-transparent hover:ring-[#3B7A57] active:scale-90 transition-all"></button>
