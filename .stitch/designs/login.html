<body class="min-h-screen flex flex-col">
<!-- TopAppBar Navigation Shell Suppressed as per Task-Focused Rule, but Brand Identity preserved -->
<header class="sticky top-0 z-50 bg-[#F9F9F7]/80 backdrop-blur-xl flex items-center justify-between px-8 py-6 w-full">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-[#3B7A57]" data-icon="restaurant">restaurant</span>
<h1 class="text-xl font-extrabold text-[#3B7A57] tracking-tighter">Fridge Manager</h1>
</div>
</header>
<main class="flex-grow flex flex-col items-center justify-center px-8 pb-12">
<!-- Hero Section: Editorial Headline -->
<section class="w-full max-w-md mb-12 text-center md:text-left">
<div class="inline-block px-4 py-1.5 mb-6 bg-primary-fixed text-on-primary-fixed-variant rounded-md text-[10px] font-bold uppercase tracking-[0.2em]">
                Digital Larder
            </div>
<h2 class="text-4xl md:text-5xl font-bold text-on-surface leading-[1.1] tracking-tight mb-4">
                Welcome back to your pantry
            </h2>
<p class="text-on-secondary-container text-lg leading-relaxed max-w-sm">
                Curating freshness and flavor starts with knowing what you have.
            </p>
</section>
<!-- Login Form Area -->
<div class="w-full max-w-md bg-surface-container-lowest rounded-[1.5rem] p-8 soft-shadow">
<form action="#" class="flex flex-col gap-6">
<!-- Email Input Block Style -->
<div class="group">
<label class="block text-on-secondary-container text-[13px] font-semibold mb-2 ml-1" for="email">Email Address</label>
<div class="bg-surface-container-highest rounded-[1.5rem] px-6 py-4 transition-all duration-300">
<input class="w-full bg-transparent border-none p-0 text-on-surface placeholder:text-outline focus:ring-0 text-md" id="email" placeholder="hello@kitchen.com" type="email"/>
</div>
</div>
<!-- Password Input Block Style -->
<div class="group">
<div class="flex justify-between items-center mb-2 px-1">
<label class="text-on-secondary-container text-[13px] font-semibold" for="password">Password</label>
<a class="text-[13px] font-medium text-on-secondary-container hover:text-primary transition-colors" href="#">Forgot Password?</a>
</div>
<div class="bg-surface-container-highest rounded-[1.5rem] px-6 py-4 transition-all duration-300">
<input class="w-full bg-transparent border-none p-0 text-on-surface placeholder:text-outline focus:ring-0 text-md" id="password" placeholder="••••••••" type="password"/>
</div>
</div>
<!-- Primary Action -->
<button class="forest-gradient text-on-primary font-bold py-4 px-8 rounded-full mt-4 active:scale-95 transition-transform text-lg shadow-lg shadow-primary/10" type="submit">
                    Log In
                </button>
</form>
<div class="mt-10 pt-8 border-t border-transparent text-center">
<p class="text-on-secondary-container text-sm">
                    New to Fridge Manager? 
                    <a class="text-primary font-bold ml-1 hover:underline underline-offset-4 decoration-2" href="#">Create account</a>
</p>
</div>
</div>
<!-- Decorative Organic Grid (Bento Style Hints) -->
<div class="hidden lg:grid grid-cols-2 gap-6 absolute left-12 bottom-12 w-64 opacity-20 pointer-events-none">
<div class="h-32 bg-primary-fixed rounded-[1.5rem]"></div>
<div class="h-48 bg-secondary-fixed rounded-[1.5rem] mt-8"></div>
</div>
</main>
<!-- Footer -->
<footer class="w-full py-12 mt-auto bg-[#F9F9F7]">
<div class="max-w-7xl mx-auto px-8 flex flex-col items-center gap-6">
<div class="text-lg font-bold text-[#3B7A57]">Fridge Manager</div>
<div class="flex gap-8 text-[#5E6572] font-['Plus_Jakarta_Sans'] text-sm">
<a class="hover:text-[#3B7A57] transition-colors focus:ring-2 focus:ring-[#3B7A57] outline-none" href="#">Privacy Policy</a>
<a class="hover:text-[#3B7A57] transition-colors focus:ring-2 focus:ring-[#3B7A57] outline-none" href="#">Terms of Service</a>
<a class="hover:text-[#3B7A57] transition-colors focus:ring-2 focus:ring-[#3B7A57] outline-none" href="#">Help Center</a>
</div>
<p class="text-[#5E6572] font-['Plus_Jakarta_Sans'] text-xs leading-relaxed opacity-60">

            </p>
</div>
